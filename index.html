<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Scribble Summoner — draw to cast!</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: #0f1220; color: #e8ecf1; font-family: system-ui, sans-serif; overflow: hidden; }
    #wrap { display: flex; height: 100vh; gap: 10px; padding: 10px; }
    #left { flex: 1; min-width: 0; position: relative; }
    #game { width: 100%; height: 100%; display: block; border-radius: 12px; background: #171b2e; }
    #panel { width: 330px; display: flex; flex-direction: column; gap: 8px; }
    #pad { width: 100%; aspect-ratio: 1; background: #171b2e; border-radius: 12px; touch-action: none; cursor: crosshair; border: 2px solid #2a3050; }
    #pad.castflash { animation: cast .35s ease-out; }
    #pad.fizzle { animation: fizzle .3s ease-out; }
    @keyframes cast { 0% { border-color: var(--castcolor, #fff); box-shadow: 0 0 24px var(--castcolor, #fff); } 100% { border-color: #2a3050; box-shadow: none; } }
    @keyframes fizzle { 0%,60% { border-color: #ff5555; transform: translateX(-4px); } 30%,90% { transform: translateX(4px); } 100% { border-color: #2a3050; transform: none; } }
    #padrow { display: flex; align-items: center; gap: 8px; }
    #padrow .hint { font-size: 11px; opacity: .55; flex: 1; }
    button { background: #2a3050; color: #e8ecf1; border: 0; padding: 7px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; }
    #cast { background: #4cc9f0; color: #101322; font-weight: 800; font-size: 15px; padding: 9px 18px; }
    #cast:disabled { background: #2a3050; color: #5a6285; cursor: default; }
    .cell { position: relative; }
    .cell .lock { display: none; position: absolute; right: 7px; top: 50%; transform: translateY(-50%); font-size: 13px; }
    .cell.locked { opacity: .32; }
    .cell.locked .lock { display: block; }
    .cell.justUnlocked { animation: unlockpop .6s ease-out; }
    @keyframes unlockpop { 0% { transform: scale(1.15); box-shadow: 0 0 18px #4cc9f0; } 100% { transform: none; box-shadow: none; } }
    #cards { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
    .card { background: #1c2138; border: 2px solid #3a4166; border-radius: 14px; padding: 18px 22px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 8px; width: 150px; transition: transform .12s, border-color .12s; }
    .card:hover { transform: translateY(-4px) scale(1.04); border-color: #4cc9f0; }
    .card b { font-size: 15px; }
    .card span { font-size: 11px; opacity: .6; line-height: 1.4; }
    .card em { font-size: 11px; opacity: .4; font-style: normal; }
    #overlay h2 { font-size: 30px; margin: 0 0 6px; }
    #bars { display: flex; flex-direction: column; gap: 4px; min-height: 66px; }
    .bar { height: 18px; background: #1c2138; border-radius: 5px; overflow: hidden; position: relative; }
    .fill { height: 100%; width: 0; transition: width .1s; }
    .label { position: absolute; left: 7px; top: 1px; font-size: 12px; text-shadow: 0 1px 2px #000; }
    #legend { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 8px; overflow-y: auto; }
    .cell { display: flex; align-items: center; gap: 7px; background: #171b2e; border-radius: 8px; padding: 3px 7px; }
    .cell b { font-size: 12px; display: block; }
    .cell span { font-size: 10px; opacity: .5; }
    #overlay { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; flex-direction: column; text-align: center; background: rgba(10,12,25,0.82); border-radius: 12px; padding: 20px; }
    #overlay h1 { font-size: 42px; margin: 0 0 12px; letter-spacing: 1px; }
    #overlay p { line-height: 1.65; margin: 6px 0 18px; }
    #overlay .small { font-size: 12px; opacity: .5; margin-top: 14px; }
    #overlay button { font-size: 17px; padding: 12px 26px; background: #4cc9f0; color: #101322; font-weight: 700; }
    @media (max-width: 760px) {
      #wrap { flex-direction: column; }
      #panel { width: 100%; flex-direction: row; flex-wrap: wrap; }
      #pad { width: 46vw; max-width: 300px; }
      #panel > div { flex: 1; min-width: 150px; }
    }
  </style>
</head>
<body>
  <div id="wrap">
    <div id="left">
      <canvas id="game"></canvas>
      <div id="overlay"></div>
    </div>
    <div id="panel">
      <canvas id="pad" width="300" height="300"></canvas>
      <div id="padrow">
        <button id="cast" disabled>CAST ⇧</button>
        <button id="clear">Clear</button>
        <div class="hint">그리고 Shift — 전장에 마우스 올리면 조준 시전!</div>
      </div>
      <div id="bars"></div>
      <div id="legend"></div>
    </div>
  </div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
